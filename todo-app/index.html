<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h1>✨ My To-Do List</h1>
        <button id="themeBtn">🌙</button>
    </div>


    <div class="input-box">

        <input 
        type="text" 
        id="taskInput" 
        placeholder="Enter your task...">

        <select id="priority">
            <option value="High">🔴 High</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>

        <button id="addBtn">Add</button>

    </div>


    <input 
    type="text" 
    id="searchInput" 
    placeholder="🔍 Search tasks...">


    <div class="filters">

        <button class="filterBtn" data-filter="all">
            All
        </button>

        <button class="filterBtn" data-filter="completed">
            Completed
        </button>

        <button class="filterBtn" data-filter="pending">
            Pending
        </button>

    </div>


    <div class="stats">

        <p>
            Total Tasks:
            <span id="totalTasks">0</span>
        </p>

        <p>
            Completed:
            <span id="completedTasks">0</span>
        </p>

    </div>


    <ul id="taskList"></ul>


    <button id="clearBtn">
        🗑 Clear Completed
    </button>


</div>


<audio id="clickSound" src="sounds/click.mp3"></audio>


<script src="script.js"></script>

</body>
</html>
